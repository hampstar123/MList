<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MList</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }

:root {
  --bg:       #141414;
  --bg2:      #1c1c1c;
  --bg3:      #222222;
  --border:   #383838;
  --border2:  #484848;
  --text:     #ffffff;
  --muted:    #a8a8a8;
  --faint:    #686868;
  --amber:    #ffd700;
  --amber-bg: rgba(255,215,0,0.07);
  --red:      #c0442a;
  --green:    #4a8c5c;
}

body { background: var(--bg); color: var(--text); font-family: 'Fira Code', monospace; font-weight: 300; }

.app { max-width: 640px; margin: 0 auto; padding: 0 1.5rem 6rem; animation: fadeUp 0.5s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* HEADER */
.header { padding: 3rem 0 2rem; border-bottom: 1px solid var(--border); }
.header-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; }
.wordmark { font-family: 'Cormorant Garant', serif; font-size: 4rem; font-weight: 300; letter-spacing: -0.02em; line-height: 1; color: var(--text); }
.wordmark span { color: var(--amber); }
.wordmark em { font-style: italic; font-weight: 300; color: var(--text); }
.tagline { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 0.5rem; font-weight: 400; }
.sync-status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.62rem; letter-spacing: 0.1em; color: var(--muted); cursor: pointer; padding: 0.25rem 0; transition: color 0.2s; user-select: none; }
.sync-status:hover { color: var(--text); }
.sync-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.4s; }
.sync-dot.ok   { background: var(--green); }
.sync-dot.err  { background: var(--red); }
.sync-dot.busy { background: var(--amber); animation: throb 1s ease-in-out infinite; }
@keyframes throb { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* PAGES */
.pages-wrap { display: flex; align-items: center; gap: 0; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.pages-wrap::-webkit-scrollbar { display: none; }
.page-tab { font-family: 'Fira Code', monospace; font-size: 0.65rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 1rem 1.1rem 0.85rem; white-space: nowrap; position: relative; transition: color 0.2s; flex-shrink: 0; display: flex; align-items: center; gap: 0.4rem; }
.page-tab::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px; background: var(--amber); transform: scaleX(0); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); transform-origin: left; }
.page-tab:hover { color: var(--text); }
.page-tab.active { color: var(--amber); }
.page-tab.active::after { transform: scaleX(1); }
.tab-count { font-size: 0.55rem; color: var(--faint); transition: color 0.2s; }
.page-tab.active .tab-count { color: var(--amber); opacity: 0.6; }
.page-tab-del { font-size: 0.7rem; color: var(--faint); opacity: 0; transition: all 0.15s; line-height: 1; }
.page-tab:hover .page-tab-del { opacity: 1; }
.page-tab-del:hover { color: var(--red); }
.page-tab-add { font-size: 0.62rem; letter-spacing: 0.1em; color: var(--faint); padding: 1rem 1rem 0.85rem; flex-shrink: 0; transition: color 0.2s; }
.page-tab-add:hover { color: var(--amber); }

/* URL BANNER */
.url-banner { background: var(--bg2); border: 1px solid var(--border); border-top: none; padding: 0.85rem 1rem; display: flex; gap: 0.5rem; align-items: center; }
.url-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: 'Fira Code', monospace; font-size: 0.7rem; font-weight: 300; padding: 0.45rem 0.75rem; outline: none; transition: border-color 0.2s; border-radius: 2px; }
.url-input:focus { border-color: var(--amber); }
.url-input::placeholder { color: var(--muted); }
.url-save-btn { background: var(--amber); color: var(--bg); font-family: 'Fira Code', monospace; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.1em; padding: 0.45rem 0.85rem; border-radius: 2px; white-space: nowrap; transition: opacity 0.15s; }
.url-save-btn:hover { opacity: 0.8; }
.url-dismiss { font-size: 0.7rem; color: var(--muted); padding: 0.45rem 0.5rem; transition: color 0.15s; flex-shrink: 0; }
.url-dismiss:hover { color: var(--text); }

/* ADD INPUT */
.add-row { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.add-input { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'Cormorant Garant', serif; font-size: 1.15rem; font-weight: 300; font-style: italic; padding: 1rem 0; outline: none; }
.add-input::placeholder { color: var(--faint); }
.add-btn { font-family: 'Fira Code', monospace; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); padding: 0 0 0 1rem; transition: color 0.2s; flex-shrink: 0; }
.add-btn:not(:disabled):hover { color: var(--amber); }
.add-btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* FILTERS */
.filter-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0 0.25rem; }
.filter-tabs { display: flex; gap: 0; }
.f-tab { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 0.25rem 0.7rem 0.25rem 0; transition: color 0.2s; margin-right: 0.5rem; }
.f-tab:hover { color: var(--text); }
.f-tab.active { color: var(--amber); }
.clear-done-btn { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); transition: color 0.2s; }
.clear-done-btn:hover { color: var(--red); }

/* LIST */
.todo-list { list-style: none; }
.todo-item { display: flex; align-items: center; gap: 0.85rem; padding: 0.7rem 0; border-bottom: 1px solid var(--border); transition: background 0.15s; animation: slideIn 0.2s ease both; cursor: pointer; }
@keyframes slideIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }
.todo-item:hover { background: var(--amber-bg); margin: 0 -0.5rem; padding-left: 0.5rem; padding-right: 0.5rem; }
.drag-handle { color: var(--faint); font-size: 0.85rem; cursor: grab; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; user-select: none; line-height: 1; padding: 0 0.1rem; }
.todo-item:hover .drag-handle { opacity: 1; }
.todo-item.dragging { opacity: 0.35; }
.todo-item.drag-over { border-top: 2px solid var(--amber); }
.check { width: 15px; height: 15px; border: 1px solid var(--border2); border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: transparent; }
.check:hover { border-color: var(--amber); }
.todo-item.done .check { background: var(--amber); border-color: var(--amber); }
.check svg { display: none; }
.todo-item.done .check svg { display: block; }
.accent-bar { width: 2px; height: 1rem; border-radius: 1px; flex-shrink: 0; opacity: 0.7; }
.todo-item.done .accent-bar { opacity: 0.15; }
.todo-text { flex: 1; font-family: 'Cormorant Garant', serif; font-size: 1.05rem; font-weight: 400; color: var(--text); line-height: 1.3; word-break: break-word; }
.todo-item.done .todo-text { text-decoration: line-through; color: var(--muted); text-decoration-color: var(--faint); }
.due-badge { font-family: 'Fira Code', monospace; font-size: 0.55rem; letter-spacing: 0.08em; padding: 0.15rem 0.4rem; border-radius: 2px; flex-shrink: 0; white-space: nowrap; }
.due-badge.overdue  { background: rgba(192,68,42,0.2);  color: #e06048; border: 1px solid rgba(192,68,42,0.3); }
.due-badge.today    { background: rgba(255,215,0,0.15); color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
.due-badge.upcoming { background: rgba(74,140,92,0.15); color: #6ab880; border: 1px solid rgba(74,140,92,0.3); }
.todo-idx { font-size: 0.55rem; color: var(--faint); letter-spacing: 0.05em; flex-shrink: 0; min-width: 1.5rem; text-align: right; font-variant-numeric: tabular-nums; }
.del-btn { color: var(--faint); font-size: 1rem; width: 1.25rem; height: 1.25rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0; transition: all 0.15s; }
.todo-item:hover .del-btn { opacity: 1; }
.del-btn:hover { color: var(--red); }

/* EMPTY */
.empty { padding: 4rem 0; text-align: center; font-family: 'Cormorant Garant', serif; font-size: 1.1rem; font-style: italic; color: var(--faint); }

/* PROGRESS */
.progress-wrap { margin-top: 2rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
.progress-meta { display: flex; justify-content: space-between; font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
.progress-track { height: 2px; background: var(--border); position: relative; overflow: visible; }
.progress-fill { position: absolute; top: 0; bottom: 0; left: 0; background: var(--amber); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
.progress-fill::after { content: ''; position: absolute; right: -1px; top: -2px; width: 5px; height: 5px; background: var(--amber); border-radius: 50%; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); padding: 2rem; width: 360px; animation: popIn 0.2s ease both; }
@keyframes popIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
.modal-title { font-family: 'Cormorant Garant', serif; font-size: 1.4rem; font-weight: 300; color: var(--text); margin-bottom: 0.2rem; }
.modal-sub { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 1.25rem; }
.modal-input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-family: 'Cormorant Garant', serif; font-size: 1rem; font-style: italic; padding: 0.6rem 0.8rem; outline: none; margin-bottom: 1rem; transition: border-color 0.2s; border-radius: 2px; }
.modal-input:focus { border-color: var(--amber); }
.modal-input::placeholder { color: var(--muted); font-style: italic; }
.modal-btns { display: flex; justify-content: flex-end; gap: 0.5rem; }
.modal-cancel { font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); padding: 0.5rem 0.8rem; border: 1px solid var(--border2); border-radius: 2px; transition: all 0.15s; }
.modal-cancel:hover { color: var(--text); border-color: var(--muted); }
.modal-confirm { font-size: 0.65rem; letter-spacing: 0.1em; background: var(--amber); color: var(--bg); padding: 0.5rem 1rem; border-radius: 2px; font-weight: 500; transition: opacity 0.15s; }
.modal-confirm:hover { opacity: 0.85; }

/* DETAIL PANEL */
.detail-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 320px; background: #1c1c1c; border-left: 1px solid #383838; z-index: 300; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; overflow: hidden; }
.detail-panel.open { transform: translateX(0); }
.detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 299; backdrop-filter: blur(2px); }
.detail-overlay.open { display: block; }
.detail-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.25rem 1rem; border-bottom: 1px solid #383838; flex-shrink: 0; }
.detail-title { font-family: 'Fira Code', monospace; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #a8a8a8; }
.detail-close { color: #686868; font-size: 1.2rem; line-height: 1; transition: color 0.15s; padding: 0.2rem; }
.detail-close:hover { color: #ffffff; }
.detail-body { flex: 1; overflow-y: auto; padding: 1.25rem; }
.detail-task { font-family: 'Cormorant Garant', serif; font-size: 1.25rem; font-weight: 400; color: #ffffff; line-height: 1.35; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid #383838; }
.detail-field { margin-bottom: 1.1rem; }
.detail-field-label { font-family: 'Fira Code', monospace; font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase; color: #686868; margin-bottom: 0.3rem; }
.detail-field-value { font-size: 0.82rem; color: #a8a8a8; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
.detail-field-value.highlight { color: #ffd700; }
.detail-no-info { font-family: 'Cormorant Garant', serif; font-style: italic; font-size: 0.95rem; color: #686868; text-align: center; margin-top: 2rem; }
.detail-actions { display: flex; gap: 0.5rem; padding: 1rem 1.25rem; border-top: 1px solid #383838; flex-shrink: 0; }
.detail-act { flex: 1; font-family: 'Fira Code', monospace; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.5rem; border: 1px solid #383838; border-radius: 2px; color: #a8a8a8; transition: all 0.15s; text-align: center; }
.detail-act:hover { border-color: var(--amber); color: var(--amber); }
.detail-act.danger:hover { border-color: var(--red); color: var(--red); }
.detail-edit-input { width: 100%; background: #222; border: 1px solid var(--amber); color: #fff; font-family: 'Cormorant Garant', serif; font-size: 1.05rem; padding: 0.5rem 0.6rem; outline: none; border-radius: 2px; resize: vertical; min-height: 56px; }
.detail-due-input { width: 100%; background: #222; border: 1px solid #484848; color: #fff; font-family: 'Fira Code', monospace; font-size: 0.8rem; padding: 0.45rem 0.6rem; outline: none; border-radius: 2px; margin-top: 0.5rem; }
.detail-due-input:focus { border-color: var(--amber); }
.detail-save-btn { width: 100%; margin-top: 0.6rem; background: var(--amber); color: #141414; font-family: 'Fira Code', monospace; font-size: 0.65rem; font-weight: 500; letter-spacing: 0.12em; padding: 0.55rem; border-radius: 2px; transition: opacity 0.15s; }
.detail-save-btn:hover { opacity: 0.85; }
.move-page-list { display: flex; flex-direction: column; gap: 0.3rem; margin-top: 0.5rem; }
.move-page-btn { font-family: 'Fira Code', monospace; font-size: 0.65rem; letter-spacing: 0.1em; padding: 0.45rem 0.75rem; border: 1px solid #383838; border-radius: 2px; color: #a8a8a8; text-align: left; transition: all 0.15s; }
.move-page-btn:hover { border-color: var(--amber); color: var(--amber); }
.move-page-btn.current { color: #686868; cursor: default; font-style: italic; }
.move-page-btn.current:hover { border-color: #383838; color: #686868; }
</style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-row">
      <div>
        <div class="wordmark"><span>M</span><em>List</em></div>
        <div class="tagline">Task manager</div>
      </div>
      <div class="sync-status" id="sync-status" onclick="toggleUrlBanner()">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-label">connecting…</span>
      </div>
    </div>
  </header>

  <nav class="pages-wrap" id="pages-wrap"></nav>

  <div class="url-banner" id="url-banner" style="display:none;">
    <input class="url-input" id="url-input" type="url" placeholder="Paste Apps Script URL…">
    <button class="url-save-btn" onclick="saveUrl()">Connect</button>
    <button class="url-dismiss" onclick="toggleUrlBanner()">✕</button>
  </div>

  <div class="add-row">
    <input class="add-input" id="add-input" type="text" placeholder="Add a task…" autocomplete="off">
    <button class="add-btn" id="add-btn" disabled>+ add</button>
  </div>

  <div class="filter-bar" id="filter-bar" style="display:none;">
    <div class="filter-tabs">
      <button class="f-tab active" data-f="all">All <span id="c-all">0</span></button>
      <button class="f-tab" data-f="open">Open <span id="c-open">0</span></button>
      <button class="f-tab" data-f="done">Done <span id="c-done">0</span></button>
    </div>
    <button class="clear-done-btn" id="clear-done-btn" style="display:none" onclick="clearDone()">Clear done</button>
  </div>

  <ul class="todo-list" id="todo-list"></ul>
  <div class="empty" id="empty">Nothing here yet.</div>

  <div class="progress-wrap" id="progress-wrap" style="display:none;">
    <div class="progress-meta">
      <span>Progress</span>
      <span id="progress-label">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

</div>

<!-- NEW PAGE MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">New page</div>
    <div class="modal-sub">Name this list — e.g. Work, Errands, Projects</div>
    <input class="modal-input" id="modal-input" type="text" placeholder="Page name…">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmPage()">Create</button>
    </div>
  </div>
</div>

<!-- DETAIL SLIDE PANEL -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <div class="detail-title">Task detail</div>
    <button class="detail-close" onclick="closeDetail()">×</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
  <div class="detail-actions">
    <button class="detail-act" onclick="startEdit()">Edit</button>
    <button class="detail-act" onclick="showMove()">Move</button>
    <button class="detail-act danger" onclick="deleteFromDetail()">Delete</button>
  </div>
</div>

<script>
'use strict';

var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxGsOWPZ120y5OAC378Qrx1wPj2KxS-5kVdUABlqJqbCdyxH2cLHeRGhoD82tQxwGSO/exec';
var ACCENTS = ['#ffd700','#5b8fa8','#7a9e6e','#b06060','#8f79b8','#c4982a','#5a9e8f','#a87070','#7070a8','#9ea85a'];
var LS_KEY  = 'mlist_3';

var S = { pages: ['Main','Work'], page: 'Main', data: {}, filter: 'all', url: SCRIPT_URL };

function todos()       { return S.data[S.page] || []; }
function setTodos(a)   { S.data[S.page] = a; }
function rndAccent()   { return ACCENTS[Math.floor(Math.random() * ACCENTS.length)]; }

// ── LOCAL STORAGE ─────────────────────────────────────────────────
function lsave() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(S)); } catch(e) {}
}
function lload() {
  try {
    var r = localStorage.getItem(LS_KEY);
    if (r) {
      var p = JSON.parse(r);
      S.pages  = p.pages  || S.pages;
      S.data   = p.data   || {};
      S.page   = p.page   || S.pages[0];
      S.filter = p.filter || 'all';
    }
  } catch(e) {}
  S.url = SCRIPT_URL; // always use hardcoded URL
}

// ── SYNC ──────────────────────────────────────────────────────────
var syncTimer = null;
function dot(cls, lbl) {
  document.getElementById('sync-dot').className = 'sync-dot ' + (cls||'');
  document.getElementById('sync-label').textContent = lbl;
}
function schedulePush() {
  if (!S.url) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(push, 1500);
}
async function push() {
  if (!S.url) return;
  dot('busy', 'saving…');
  try {
    var slim = todos().map(function(t) {
      return { id: t.id, text: t.text, done: t.done, color: t.color, due: t.due||'' };
    });
    var url = S.url + '?action=update&page=' + enc(S.page) + '&todos=' + enc(JSON.stringify(slim));
    var r = await fetch(url);
    var d = await r.json();
    dot(d.ok ? 'ok' : 'err', d.ok ? 'synced' : 'error');
  } catch(e) { dot('err', 'offline'); }
}
async function pull(page) {
  if (!S.url) return;
  dot('busy', 'loading…');
  try {
    var r = await fetch(S.url + '?action=load&page=' + enc(page || S.page));
    var d = await r.json();
    if (d.ok) { S.data[page || S.page] = d.todos || []; lsave(); dot('ok', 'synced'); }
    else throw 0;
  } catch(e) { dot('err', 'offline'); }
}
async function pullPages() {
  if (!S.url) return;
  try {
    var r = await fetch(S.url + '?action=pages');
    var d = await r.json();
    if (d.ok) { d.pages.forEach(function(p) { if (!S.pages.includes(p)) S.pages.push(p); }); lsave(); renderPages(); }
  } catch(e) {}
}
function enc(s) { return encodeURIComponent(s); }

// ── URL BANNER ────────────────────────────────────────────────────
function toggleUrlBanner() {
  var b = document.getElementById('url-banner');
  var shown = b.style.display !== 'none';
  b.style.display = shown ? 'none' : 'flex';
  if (!shown) { document.getElementById('url-input').value = S.url; setTimeout(function() { document.getElementById('url-input').focus(); }, 50); }
}
async function saveUrl() {
  var v = document.getElementById('url-input').value.trim();
  if (!v || !v.startsWith('https://')) { alert('Please enter a valid https:// URL.'); return; }
  S.url = v; lsave();
  document.getElementById('url-banner').style.display = 'none';
  dot('busy', 'connecting…');
  await pullPages(); await pull(); render();
}

// ── PAGES ─────────────────────────────────────────────────────────
function renderPages() {
  var wrap = document.getElementById('pages-wrap');
  wrap.innerHTML = '';
  S.pages.forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'page-tab' + (p === S.page ? ' active' : '');
    var count = (S.data[p] || []).filter(function(t) { return !t.done; }).length;
    var ns = document.createElement('span'); ns.textContent = p; btn.appendChild(ns);
    var cs = document.createElement('span'); cs.className = 'tab-count'; cs.textContent = count > 0 ? count : ''; btn.appendChild(cs);
    if (S.pages.length > 1) {
      var del = document.createElement('button'); del.className = 'page-tab-del'; del.textContent = '×';
      del.addEventListener('click', function(e) { e.stopPropagation(); if (confirm('Delete "' + p + '"?')) deletePage(p); });
      btn.appendChild(del);
    }
    btn.addEventListener('click', function() { switchPage(p); });
    wrap.appendChild(btn);
  });
  var add = document.createElement('button'); add.className = 'page-tab-add'; add.textContent = '+ page';
  add.addEventListener('click', openModal); wrap.appendChild(add);
}
async function switchPage(p) { S.page = p; S.filter = 'all'; lsave(); renderPages(); if (S.url) await pull(p); render(); }
function deletePage(p) {
  S.pages = S.pages.filter(function(x) { return x !== p; });
  delete S.data[p];
  if (S.page === p) S.page = S.pages[0];
  lsave(); renderPages(); render();
}
function openModal() { document.getElementById('modal').classList.add('open'); setTimeout(function() { document.getElementById('modal-input').focus(); }, 50); }
function closeModal() { document.getElementById('modal').classList.remove('open'); document.getElementById('modal-input').value = ''; }
function confirmPage() {
  var name = document.getElementById('modal-input').value.trim();
  if (!name) return;
  if (S.pages.includes(name)) { alert('Already exists.'); return; }
  S.pages.push(name); lsave(); closeModal(); switchPage(name);
}

// ── TODOS ─────────────────────────────────────────────────────────
function addTodo() {
  var inp = document.getElementById('add-input'), text = inp.value.trim(); if (!text) return;
  todos().push({ id: Date.now(), text: text, done: false, color: rndAccent(), due: '', sender: '', subject: '', snippet: '' });
  inp.value = ''; document.getElementById('add-btn').disabled = true;
  lsave(); schedulePush(); render();
}
function toggleTodo(id) {
  setTodos(todos().map(function(t) { return t.id === id ? Object.assign({}, t, { done: !t.done }) : t; }));
  lsave(); schedulePush(); render();
}
function removeTodo(id) { setTodos(todos().filter(function(t) { return t.id !== id; })); lsave(); schedulePush(); render(); }
function clearDone() { setTodos(todos().filter(function(t) { return !t.done; })); lsave(); schedulePush(); render(); }

// ── DRAG TO REORDER ───────────────────────────────────────────────
var dragSrcId = null;
function onDragStart(e) { dragSrcId = this.dataset.id; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDragOver(e)  { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; this.classList.add('drag-over'); }
function onDragLeave()  { this.classList.remove('drag-over'); }
function onDragEnd()    { document.querySelectorAll('.todo-item').forEach(function(el) { el.classList.remove('dragging','drag-over'); }); }
function onDrop(e) {
  e.stopPropagation(); this.classList.remove('drag-over');
  var targetId = this.dataset.id;
  if (!dragSrcId || dragSrcId === targetId) return;
  var arr = todos();
  var si = arr.findIndex(function(t) { return String(t.id) === String(dragSrcId); });
  var ti = arr.findIndex(function(t) { return String(t.id) === String(targetId); });
  if (si < 0 || ti < 0) return;
  var moved = arr.splice(si, 1)[0]; arr.splice(ti, 0, moved);
  setTodos(arr); lsave(); schedulePush(); render();
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  var all = todos(), done = all.filter(function(t){return t.done;}), open = all.filter(function(t){return !t.done;});
  document.getElementById('c-all').textContent  = all.length;
  document.getElementById('c-open').textContent = open.length;
  document.getElementById('c-done').textContent = done.length;
  document.getElementById('filter-bar').style.display = all.length ? 'flex' : 'none';
  document.querySelectorAll('.f-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.f === S.filter); });
  document.getElementById('clear-done-btn').style.display = done.length ? '' : 'none';
  var vis = S.filter==='done' ? done : S.filter==='open' ? open : all;
  var listEl = document.getElementById('todo-list'), emptyEl = document.getElementById('empty');
  listEl.innerHTML = '';
  if (!vis.length) { emptyEl.style.display=''; emptyEl.textContent = all.length ? 'Nothing here.' : 'Nothing here yet.'; }
  else { emptyEl.style.display='none'; vis.forEach(function(t,i) { listEl.appendChild(buildItem(t,i)); }); }
  var pw = document.getElementById('progress-wrap');
  if (all.length > 0) {
    pw.style.display='';
    var pct = Math.round(done.length/all.length*100);
    document.getElementById('progress-label').textContent = done.length + ' / ' + all.length + '  (' + pct + '%)';
    document.getElementById('progress-fill').style.width = pct + '%';
  } else { pw.style.display='none'; }
  renderPages();
}

function buildItem(todo, idx) {
  var li = document.createElement('li');
  li.className = 'todo-item' + (todo.done ? ' done' : '');
  li.setAttribute('draggable','true');
  li.dataset.id = todo.id;
  li.addEventListener('click', function() { openDetail(todo); });
  li.addEventListener('dragstart', onDragStart);
  li.addEventListener('dragover',  onDragOver);
  li.addEventListener('dragleave', onDragLeave);
  li.addEventListener('drop',      onDrop);
  li.addEventListener('dragend',   onDragEnd);

  var handle = document.createElement('span'); handle.className='drag-handle'; handle.innerHTML='&#8942;&#8942;';
  handle.addEventListener('mousedown', function(e){e.stopPropagation();}); li.appendChild(handle);

  var check = document.createElement('button'); check.className='check';
  check.innerHTML = '<svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="#141414" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5 5 4 8 8.5 2"/></svg>';
  check.addEventListener('click', function(e){e.stopPropagation(); toggleTodo(todo.id);}); li.appendChild(check);

  var bar = document.createElement('div'); bar.className='accent-bar'; bar.style.background=todo.color; li.appendChild(bar);

  var text = document.createElement('span'); text.className='todo-text'; text.textContent=todo.text; li.appendChild(text);

  if (todo.due && !todo.done) {
    var badge = document.createElement('span');
    var today = new Date(); today.setHours(0,0,0,0);
    var dueDate = new Date(todo.due + 'T00:00:00');
    var diff = Math.round((dueDate - today) / 86400000);
    badge.className = 'due-badge ' + (diff < 0 ? 'overdue' : diff === 0 ? 'today' : 'upcoming');
    badge.textContent = diff < 0 ? 'Overdue' : diff === 0 ? 'Today' : todo.due;
    li.appendChild(badge);
  }

  var num = document.createElement('span'); num.className='todo-idx'; num.textContent=String(idx+1).padStart(2,'0'); li.appendChild(num);

  var del = document.createElement('button'); del.className='del-btn'; del.innerHTML='×';
  del.addEventListener('click', function(e){e.stopPropagation(); removeTodo(todo.id);}); li.appendChild(del);

  return li;
}

// ── DETAIL PANEL ─────────────────────────────────────────────────
var detailTodo = null;
function openDetail(todo) { detailTodo = todo; renderDetailBody(); document.getElementById('detail-panel').classList.add('open'); document.getElementById('detail-overlay').classList.add('open'); }
function closeDetail()    { document.getElementById('detail-panel').classList.remove('open'); document.getElementById('detail-overlay').classList.remove('open'); detailTodo = null; }

function renderDetailBody() {
  var todo = detailTodo, body = document.getElementById('detail-body');
  var html = '<div class="detail-task">' + escHtml(todo.text) + '</div>';
  if (todo.due)     html += field('Due date', escHtml(todo.due), true);
  if (todo.sender)  html += field('From', escHtml(todo.sender), true);
  if (todo.subject) html += field('Subject', escHtml(todo.subject), false);
  if (todo.snippet) html += '<div class="detail-field"><div class="detail-field-label">Summary</div><div class="detail-field-value" id="detail-snippet"></div></div>';
  if (!todo.due && !todo.sender && !todo.subject && !todo.snippet) html += '<div class="detail-no-info">No email reference for this task.</div>';
  body.innerHTML = html;
  if (todo.snippet && document.getElementById('detail-snippet')) document.getElementById('detail-snippet').textContent = todo.snippet;
}
function field(label, val, highlight) {
  return '<div class="detail-field"><div class="detail-field-label">' + label + '</div><div class="detail-field-value' + (highlight?' highlight':'') + '">' + val + '</div></div>';
}

function startEdit() {
  if (!detailTodo) return;
  document.getElementById('detail-body').innerHTML =
    '<div class="detail-field-label" style="margin-bottom:0.4rem;">Task</div>'
    + '<textarea class="detail-edit-input" id="edit-text-input">' + escHtml(detailTodo.text) + '</textarea>'
    + '<div class="detail-field-label" style="margin:0.75rem 0 0.3rem;">Due date</div>'
    + '<input class="detail-due-input" id="edit-due-input" type="date" value="' + (detailTodo.due||'') + '">'
    + '<button class="detail-save-btn" onclick="saveEdit()">Save changes</button>';
}
function saveEdit() {
  if (!detailTodo) return;
  var newText = document.getElementById('edit-text-input').value.trim();
  var newDue  = document.getElementById('edit-due-input').value;
  if (!newText) return;
  setTodos(todos().map(function(t) { return t.id === detailTodo.id ? Object.assign({},t,{text:newText,due:newDue}) : t; }));
  detailTodo = Object.assign({}, detailTodo, {text:newText, due:newDue});
  lsave(); schedulePush(); render(); renderDetailBody();
}
function showMove() {
  if (!detailTodo) return;
  var html = '<div class="detail-field-label" style="margin-bottom:0.5rem;">Move to page</div><div class="move-page-list">';
  S.pages.forEach(function(p) {
    var cur = p === S.page;
    html += '<button class="move-page-btn' + (cur?' current':'') + '"' + (cur?'':' onclick="moveToPage(\'' + p + '\')"') + '>' + escHtml(p) + (cur?' — current':'') + '</button>';
  });
  document.getElementById('detail-body').innerHTML = html + '</div>';
}
function moveToPage(targetPage) {
  if (!detailTodo || targetPage === S.page) return;
  var task = detailTodo;
  setTodos(todos().filter(function(t) { return t.id !== task.id; }));
  if (!S.data[targetPage]) S.data[targetPage] = [];
  S.data[targetPage].push(task);
  lsave(); schedulePush(); render(); closeDetail();
}
function deleteFromDetail() {
  if (!detailTodo) return;
  if (!confirm('Delete this task?')) return;
  removeTodo(detailTodo.id); closeDetail();
}
function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── INIT ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  lload();
  renderPages(); render();
  dot('busy', 'connecting…');
  pullPages().then(function() { return pull(); }).then(function() { render(); });

  var addInput = document.getElementById('add-input'), addBtn = document.getElementById('add-btn');
  addInput.addEventListener('input', function() { addBtn.disabled = !addInput.value.trim(); });
  addInput.addEventListener('keydown', function(e) { if (e.key==='Enter') addTodo(); });
  addBtn.addEventListener('click', addTodo);
  document.querySelectorAll('.f-tab').forEach(function(tab) { tab.addEventListener('click', function() { S.filter=tab.dataset.f; render(); }); });
  document.getElementById('modal-input').addEventListener('keydown', function(e) { if(e.key==='Enter') confirmPage(); if(e.key==='Escape') closeModal(); });
  document.getElementById('modal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
  document.getElementById('url-input').addEventListener('keydown', function(e) { if(e.key==='Enter') saveUrl(); });
});
</script>
</body>
