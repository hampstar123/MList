<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MList</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9C%93</text></svg>" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- React + Babel from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #f5f5f4; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .sans { font-family: 'Inter', sans-serif; }
    .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.04em; }
    .icon { display: inline-block; vertical-align: middle; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, Fragment } = React;
    const e = React.createElement;

    // ---------- Icon helper (Lucide-style) ----------
    function makeIcon(paths) {
      return function (props) {
        const size = props.size || 16;
        const stroke = props.stroke || 'currentColor';
        const strokeWidth = props.strokeWidth || 2;
        return (
          <svg
            className="icon"
            width={size}
            height={size}
            viewBox="0 0 24 24"
            fill="none"
            stroke={stroke}
            strokeWidth={strokeWidth}
            strokeLinecap="round"
            strokeLinejoin="round"
          >
            {paths}
          </svg>
        );
      };
    }

    const Plus = makeIcon(
      <Fragment>
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </Fragment>
    );

    const Check = makeIcon(
      <polyline points="20 6 9 17 4 12" />
    );

    const Trash2 = makeIcon(
      <Fragment>
        <polyline points="3 6 5 6 21 6" />
        <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6" />
        <line x1="10" y1="11" x2="10" y2="17" />
        <line x1="14" y1="11" x2="14" y2="17" />
        <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" />
      </Fragment>
    );

    const RotateCcw = makeIcon(
      <Fragment>
        <polyline points="1 4 1 10 7 10" />
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
      </Fragment>
    );

    const Shuffle = makeIcon(
      <Fragment>
        <polyline points="16 3 21 3 21 8" />
        <line x1="4" y1="20" x2="21" y2="3" />
        <polyline points="21 16 21 21 16 21" />
        <line x1="15" y1="15" x2="21" y2="21" />
        <line x1="4" y1="4" x2="9" y2="9" />
      </Fragment>
    );

    // ---------- Palette ----------
    const ACCENTS = [
      '#ef4444', '#f97316', '#eab308', '#84cc16', '#22c55e',
      '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6',
      '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899',
      '#f43f5e', '#f59e0b', '#34d399', '#fb7185'
    ];

    function randomAccent() {
      return ACCENTS[Math.floor(Math.random() * ACCENTS.length)];
    }

    const STORAGE_KEY = 'mlist_v1';

    function App() {
      const [todos, setTodos] = useState([]);
      const [input, setInput] = useState('');
      const [filter, setFilter] = useState('all');
      const [loaded, setLoaded] = useState(false);

      // Load from localStorage
      useEffect(function () {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            const migrated = parsed.map(function (t) {
              return Object.assign({}, t, {
                color: ACCENTS.indexOf(t.color) >= 0 ? t.color : randomAccent()
              });
            });
            setTodos(migrated);
          }
        } catch (err) {
          console.error('Load failed:', err);
        }
        setLoaded(true);
      }, []);

      // Save to localStorage
      useEffect(function () {
        if (!loaded) return;
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
        } catch (err) {
          console.error('Save failed:', err);
        }
      }, [todos, loaded]);

      function addTodo() {
        const text = input.trim();
        if (!text) return;
        setTodos(function (prev) {
          return prev.concat([{
            id: Date.now(),
            text: text,
            notes: '',
            done: false,
            color: randomAccent()
          }]);
        });
        setInput('');
      }

      function toggle(id) {
        setTodos(function (prev) {
          return prev.map(function (t) {
            return t.id === id ? Object.assign({}, t, { done: !t.done }) : t;
          });
        });
      }

      function updateNotes(id, notes) {
        setTodos(function (prev) {
          return prev.map(function (t) {
            return t.id === id ? Object.assign({}, t, { notes: notes }) : t;
          });
        });
      }

      function remove(id) {
        setTodos(function (prev) {
          return prev.filter(function (t) { return t.id !== id; });
        });
      }

      function clearDone() {
        setTodos(function (prev) {
          return prev.filter(function (t) { return !t.done; });
        });
      }

      function reshuffleColors() {
        setTodos(function (prev) {
          return prev.map(function (t) {
            return Object.assign({}, t, { color: randomAccent() });
          });
        });
      }

      function handleKey(ev) {
        if (ev.key === 'Enter') addTodo();
      }

      const filtered = useMemo(function () {
        if (filter === 'done') return todos.filter(function (t) { return t.done; });
        return todos;
      }, [todos, filter]);

      const stats = useMemo(function () {
        const done = todos.filter(function (t) { return t.done; }).length;
        return {
          total: todos.length,
          done: done,
          active: todos.length - done
        };
      }, [todos]);

      const progressPct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;

      return (
        <div className="min-h-screen bg-stone-100">
          <div className="max-w-2xl mx-auto px-6 py-10">

            {/* Header */}
            <header className="border-b-2 border-stone-900 pb-6 mb-10">
              <div className="flex items-start justify-between gap-6 flex-wrap">
                <div>
                  <div className="display text-sm tracking-widest text-stone-500 mb-2">
                    {stats.done} COMPLETE
                  </div>
                  <h1 className="display text-6xl md:text-7xl text-stone-900 leading-none">
                    MLIST
                  </h1>
                </div>
                <div className="flex gap-2">
                  {todos.length > 1 && (
                    <button
                      onClick={reshuffleColors}
                      className="display flex items-center gap-2 px-4 py-2 border border-stone-400 text-stone-700 hover:bg-stone-900 hover:text-stone-100 hover:border-stone-900 transition-colors text-sm tracking-wider"
                    >
                      <Shuffle size={14} /> SHUFFLE
                    </button>
                  )}
                  {stats.done > 0 && (
                    <button
                      onClick={clearDone}
                      className="display flex items-center gap-2 px-4 py-2 border border-stone-400 text-stone-700 hover:bg-stone-900 hover:text-stone-100 hover:border-stone-900 transition-colors text-sm tracking-wider"
                    >
                      <RotateCcw size={14} /> CLEAR COMPLETE
                    </button>
                  )}
                </div>
              </div>
            </header>

            {/* Input */}
            <div className="mb-8">
              <div className="flex items-baseline gap-4 mb-3">
                <div className="display text-sm text-stone-400 tracking-widest">NEW</div>
                <div className="sans text-base text-stone-900 font-medium">What needs doing?</div>
              </div>
              <div className="ml-12 flex gap-2">
                <input
                  type="text"
                  value={input}
                  onChange={function (ev) { setInput(ev.target.value); }}
                  onKeyDown={handleKey}
                  placeholder="Type a task and press Enter…"
                  className="sans flex-1 px-4 py-3 border border-stone-300 bg-white text-stone-900 text-sm placeholder:text-stone-400 focus:outline-none focus:border-stone-900 transition-colors"
                />
                <button
                  onClick={addTodo}
                  disabled={!input.trim()}
                  className="display flex items-center gap-2 px-5 py-3 bg-stone-900 text-stone-100 hover:bg-stone-800 transition-colors text-sm tracking-wider disabled:bg-stone-300 disabled:cursor-not-allowed"
                >
                  <Plus size={16} /> ADD
                </button>
              </div>
            </div>

            {/* Filter tabs */}
            {todos.length > 0 && (
              <div className="mb-6 flex gap-1 border-b border-stone-300">
                {[
                  { v: 'all', l: 'ALL', n: stats.total },
                  { v: 'done', l: 'COMPLETE', n: stats.done }
                ].map(function (tab) {
                  const isActive = filter === tab.v;
                  return (
                    <button
                      key={tab.v}
                      onClick={function () { setFilter(tab.v); }}
                      className={'display text-sm tracking-widest px-4 py-2 border-b-2 -mb-px transition-colors ' + (isActive ? 'border-stone-900 text-stone-900' : 'border-transparent text-stone-400 hover:text-stone-700')}
                    >
                      {tab.l} <span className="text-stone-400">·{tab.n}</span>
                    </button>
                  );
                })}
              </div>
            )}

            {/* List */}
            {filtered.length === 0 ? (
              <div className="bg-white border-l-4 border-stone-300 p-8 text-center">
                <div className="sans text-stone-500 text-base font-light">
                  {todos.length === 0 ? 'Nothing here yet. Start by adding a task above.' : 'Nothing complete yet.'}
                </div>
              </div>
            ) : (
              <ul className="space-y-3 list-none p-0">
                {filtered.map(function (todo, i) {
                  return (
                    <TodoCard
                      key={todo.id}
                      todo={todo}
                      index={i}
                      onToggle={function () { toggle(todo.id); }}
                      onRemove={function () { remove(todo.id); }}
                      onUpdateNotes={function (notes) { updateNotes(todo.id, notes); }}
                    />
                  );
                })}
              </ul>
            )}

            {/* Progress */}
            {todos.length > 0 && (
              <div className="mt-10 pt-6 border-t border-stone-300">
                <div className="flex items-center justify-between mb-2">
                  <div className="display text-sm tracking-widest text-stone-500">PROGRESS</div>
                  <div className="display text-sm tracking-widest text-stone-700">{progressPct}%</div>
                </div>
                <div className="h-px bg-stone-200 relative overflow-hidden">
                  <div
                    className="absolute inset-y-0 left-0 bg-stone-900 transition-all duration-300"
                    style={{ width: progressPct + '%' }}
                  />
                </div>
              </div>
            )}

            {/* Footer */}
            <footer className="mt-12 pt-6 border-t border-stone-300 display text-xs tracking-widest text-stone-500 flex justify-between">
              <span>MLIST</span>
              <span>V1.6</span>
            </footer>

          </div>
        </div>
      );
    }

    function TodoCard(props) {
      const todo = props.todo;
      const index = props.index;
      const onToggle = props.onToggle;
      const onRemove = props.onRemove;
      const onUpdateNotes = props.onUpdateNotes;

      const accentColor = todo.color || ACCENTS[0];
      const MAX_NOTES = 200;

      return (
        <li
          className="group bg-white relative overflow-hidden transition-all shadow-sm"
          style={{ borderLeft: '6px solid ' + (todo.done ? '#d6d3d1' : accentColor) }}
        >
          <div className="p-5">

            {/* Title row */}
            <div className="flex items-start gap-3 mb-2">
              {/* Toggle switch */}
              <button
                onClick={onToggle}
                role="switch"
                aria-checked={todo.done}
                aria-label={todo.done ? 'Mark incomplete' : 'Mark complete'}
                className="mt-1 flex-shrink-0 relative w-11 h-6 rounded-full transition-colors duration-200 focus:outline-none"
                style={{ background: todo.done ? '#3b82f6' : '#22c55e' }}
              >
                <span
                  className="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all duration-200"
                  style={{ left: todo.done ? 'calc(100% - 22px)' : '2px' }}
                />
              </button>

              <div className="display text-sm text-stone-400 tracking-widest flex-shrink-0 mt-1.5">
                {String(index + 1).padStart(2, '0')}
              </div>

              <h3
                className={'sans text-lg font-medium leading-snug flex-1 break-words ' + (todo.done ? 'text-stone-400 line-through' : 'text-stone-900')}
                style={{ margin: 0 }}
              >
                {todo.text}
              </h3>

              <button
                onClick={onRemove}
                className="opacity-0 group-hover:opacity-100 text-stone-400 hover:text-rose-700 transition-all flex-shrink-0 mt-1"
                aria-label="Delete task"
              >
                <Trash2 size={16} />
              </button>
            </div>

            {/* Notes area */}
            <div style={{ marginLeft: '72px' }}>
              <textarea
                value={todo.notes || ''}
                onChange={function (ev) {
                  if (ev.target.value.length <= MAX_NOTES) {
                    onUpdateNotes(ev.target.value);
                  }
                }}
                placeholder="Add a brief note…"
                rows={2}
                disabled={todo.done}
                className={'sans w-full px-3 py-2 bg-stone-50 border border-stone-200 text-sm leading-relaxed placeholder:text-stone-400 focus:outline-none focus:border-stone-500 focus:bg-white transition-colors resize-none ' + (todo.done ? 'text-stone-400 italic' : 'text-stone-700')}
              />
              {todo.notes && todo.notes.length > 0 && (
                <div className="display text-xs tracking-widest text-stone-400 mt-1 text-right">
                  {todo.notes.length} / {MAX_NOTES}
                </div>
              )}
            </div>

          </div>
        </li>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
